name: Send Reminders

on:
  schedule:
    - cron: '0 * * * *'  # 毎時実行
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ← これを追加
  
jobs:
  send-reminders:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4.2.2 
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Initialize database
        run: python -c "from models.database import Base, engine; Base.metadata.create_all(engine)"
        env:
          PYTHONPATH: .
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: python services/reminder.py
        env:
          PYTHONPATH: .
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
